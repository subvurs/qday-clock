name: pages-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Q-day Clock
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      # Fail loud (not silent) if the signing-key secret is not configured.
      # Silently falling back to an ephemeral key would publish a different
      # pubkey on every deploy — breaks the "embed in about.html so readers
      # can re-verify clock_state.json" story. Per CLAUDE.md §8.
      - name: Assert signing-key secret is present
        env:
          QDAY_SIGNING_KEY_B64: ${{ secrets.QDAY_SIGNING_KEY_B64 }}
        run: |
          if [ -z "${QDAY_SIGNING_KEY_B64}" ]; then
            echo "ERROR: repo secret QDAY_SIGNING_KEY_B64 is not set." >&2
            echo "ERROR: refusing to deploy with an ephemeral signing key." >&2
            exit 1
          fi
          echo "QDAY_SIGNING_KEY_B64 is set (length=${#QDAY_SIGNING_KEY_B64})."

      # Copy the committed site/data/ into _site/ so the build step
      # (with --use-committed-state) can read the manifest-fed
      # clock_state.json that the refresh workflow produced. Pre-Option-α
      # this step did not exist and the build always recomputed from
      # seeds; that silently overwrote the refresh-produced state at
      # every deploy.
      - name: Stage committed site/data
        run: |
          mkdir -p _site/data
          if [ -f site/data/clock_state.json ]; then
            cp site/data/clock_state.json _site/data/clock_state.json
            echo "Staged committed clock_state.json:"
            ls -la _site/data/
          else
            echo "ERROR: site/data/clock_state.json is missing from the tree." >&2
            echo "ERROR: the refresh workflow is the producer; check that the" >&2
            echo "ERROR: most recent refresh PR was merged and that site/data/" >&2
            echo "ERROR: is tracked in the repo." >&2
            exit 1
          fi

      # The real renderer: consume the committed clock_state.json
      # (refresh workflow's output), re-sign it with the production
      # signing key, and render all 5 HTML pages into _site/. This is
      # the qday_clock.build entry point with --use-committed-state.
      #
      # Pre-Option-α this step ran without --use-committed-state and
      # called compute_clock_state from seeds every deploy — which
      # silently overwrote the manifest-fed score produced by the
      # refresh workflow. Adding --use-committed-state closes that gap.
      - name: Render static site
        env:
          QDAY_SIGNING_KEY_B64: ${{ secrets.QDAY_SIGNING_KEY_B64 }}
        run: |
          python -m qday_clock.build \
            --site-dir _site \
            --seed-signals data/seed_signals.json \
            --methodology METHODOLOGY.md \
            --use-committed-state

      # qday_clock.build deliberately does not copy site/assets/ (its job
      # is to render pages + sign the manifest, not to manage static
      # asset trees). The workflow owns asset + CNAME placement.
      - name: Stage assets and CNAME
        run: |
          if [ -d site/assets ]; then
            cp -R site/assets _site/assets
          fi
          if [ -f site/CNAME ]; then
            cp site/CNAME _site/CNAME
          fi

      # Defence-in-depth: verify the build actually produced every page
      # before we hand the artifact to actions/upload-pages-artifact. If
      # something earlier silently no-op'd, fail here instead of shipping
      # a half-rendered site.
      - name: Verify rendered output
        run: |
          set -e
          for page in index.html methodology.html about.html dashboard.html sources.html; do
            if [ ! -s "_site/${page}" ]; then
              echo "ERROR: _site/${page} missing or empty after build" >&2
              exit 1
            fi
          done
          if [ ! -s _site/data/clock_state.json ]; then
            echo "ERROR: _site/data/clock_state.json missing or empty" >&2
            exit 1
          fi
          echo "All 5 pages and signed clock_state.json present."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
