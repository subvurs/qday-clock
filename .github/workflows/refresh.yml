name: refresh

# Daily clock refresh — recompute `site/data/clock_state.json` from
# current signals and open a PR for human review. Per plan §F we never
# auto-publish; the PR is the human-in-the-loop gate.
#
# Status:
#   * v0.1.0: workflow_dispatch only — no upstream Curator artifact.
#   * v0.2 (2026-06-26): daily cron ENABLED. The Curator side
#     (subvurs/quantum-curator, commits 7847250 + 55efcfa) now produces
#     a signed CuratorManifest each day and force-pushes it to the
#     `manifest` branch of the curator repo. The signing pubkey is in
#     the QDAY_CURATOR_PUBKEY_B64 repo secret. Cron still ran
#     SEEDS-ONLY at this point because the input was empty under cron.
#   * v0.3 (2026-06-27): `curator_manifest_url` now defaults
#     to the raw.githubusercontent.com manifest-branch URL when the
#     input is empty (true for every `schedule` invocation, plus
#     workflow_dispatch with the field left blank). The `Fetch Curator
#     manifest` step always runs and its `if:` gate is removed. To
#     run truly seeds-only, use the local CLI; the workflow itself no
#     longer supports it. Verified end-to-end smoke on 2026-06-27 cron
#     fired SEEDS-ONLY (clock_score=0.2589 / 17.79h); manual
#     workflow_dispatch with explicit URL gave 0.4153 / 14.03h —
#     this PR makes cron behave like the latter.
#   * v0.4 (this PR, 2026-06-28): fix the diff-detection bug that
#     silently blocked v0.2-v0.3 from ever opening a PR. The original
#     check `git diff --quiet site/data/` only inspects TRACKED files,
#     and `site/data/clock_state.json` was never tracked in main. So
#     even after v0.3 made the cron compute the right score (0.4153 /
#     14.03h), the diff step always returned `changed=false` and the
#     `peter-evans/create-pull-request` step was skipped. Verified by
#     manual workflow_dispatch run 28340868988 on 2026-06-29:
#     `refresh: ingested manifest with 171 articles ...
#     clock_score=0.4153 clock_hours=14.03` immediately followed by
#     `No change to site/data; nothing to PR.` and confirmed
#     icqubit.com was still serving the seeds-only state (0.2589 /
#     17.79h). This PR (a) commits the current deployed seeds-only
#     state as the initial site/data/clock_state.json so future runs
#     have something to diff against, and (b) switches the diff step
#     to `git status --porcelain` so it also catches untracked-file
#     creation defensively. NOTE: pages-deploy.yml will still
#     regenerate clock_state.json from seeds at every deploy; that
#     is fixed in a separate follow-up PR (Option α step 2) so the
#     two behaviour changes are independently reviewable.
#   * v0.5 (this PR, 2026-06-28): sign the refresh-time manifest. The
#     pre-v0.5 inline script wrote canonical-but-UNSIGNED JSON; CI's
#     "Verify signed manifest (if present)" step (ci.yml:48) failed
#     the very first auto-refresh PR (#7) with
#     `missing signature or signing_pubkey field`. This was latent
#     under v0.2-v0.3 because the diff-detection bug meant the PR
#     never opened; v0.4 (PR #5) unblocked PR creation and surfaced
#     it. Fix: import `write_signed_manifest` and re-use
#     QDAY_SIGNING_KEY_B64 so refresh-time and deploy-time signatures
#     are byte-identical for identical content (the deploy re-sign in
#     pages-deploy.yml is then idempotent for the common case). If
#     the secret is unset we raise rather than write an unsigned
#     manifest, per CLAUDE.md §8.

on:
  workflow_dispatch:
    inputs:
      curator_manifest_url:
        description: >-
          (Optional) HTTPS URL of a signed Curator manifest JSON to
          download and feed through fetch_manifest. Leave blank to
          use the default manifest URL on the curator repo's
          `manifest` branch.
        required: false
        type: string
        default: ""
  schedule:
    - cron: "0 8 * * *"   # daily 08:00 UTC — Curator finishes ~07:30 UTC

permissions:
  contents: write
  pull-requests: write

# Note: no `defaults: run: working-directory:` block. An earlier
# revision of this workflow set it to `public_interest/qday_clock`
# back when qday-clock lived as a subdirectory of the subvurs
# monorepo. In the standalone subvurs/qday-clock repo the `qday_clock`
# package lives at the repo root, so leaving the old default in place
# made every step fail with "No such file or directory" the moment
# workflow_dispatch was first exercised end-to-end (2026-06-27 K11
# smoke, run 28272363714). Removed rather than corrected to `.`
# because the default working directory is already the repo root.
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Q-day Clock
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      # Fetch the Curator manifest. Defaults to the manifest-branch
      # raw URL on subvurs/quantum-curator when the workflow_dispatch
      # input is empty (always true under `schedule`). Fail-loud per
      # CLAUDE.md §8 — if the manifest isn't reachable we want the
      # workflow to fail, not silently fall back to seeds-only.
      - name: Fetch Curator manifest
        id: fetch
        env:
          MANIFEST_URL: ${{ inputs.curator_manifest_url || 'https://raw.githubusercontent.com/subvurs/quantum-curator/manifest/curator_manifest.json' }}
        run: |
          mkdir -p _refresh
          echo "Fetching: ${MANIFEST_URL}"
          curl -fSL --retry 3 \
            "${MANIFEST_URL}" \
            -o _refresh/curator_manifest.json
          ls -la _refresh/

      - name: Recompute clock_state.json
        env:
          QDAY_PINNED_PUBKEY_B64: ${{ secrets.QDAY_CURATOR_PUBKEY_B64 }}
          QDAY_SIGNING_KEY_B64: ${{ secrets.QDAY_SIGNING_KEY_B64 }}
        run: |
          # The refresh CLI is post-MVP; until it lands, we drive the
          # pipeline directly via a small inline script. Per CLAUDE.md
          # §8 every failure mode raises rather than being swallowed.
          #
          # Signing note (2026-06-28): the committed clock_state.json
          # must carry a valid signature + signing_pubkey so reviewers
          # on the auto-refresh PR can verify the manifest end-to-end
          # (and so the `ci.yml` "Verify signed manifest (if present)"
          # step passes). We re-use QDAY_SIGNING_KEY_B64 — the same key
          # the deploy workflow uses to re-sign at publish — so refresh
          # and deploy produce byte-identical canonical output for
          # identical content. The deploy-time re-sign is then
          # idempotent for the common case (refresh-only sources, no
          # build code change). If/when refresh and deploy keys split,
          # this step will switch to a dedicated QDAY_REFRESH_SIGNING_KEY_B64.
          python - <<'PY'
          import base64
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          from qday_clock.core.signing import SigningKey
          from qday_clock.ingest.seed_signals import load_seed_signals
          from qday_clock.render.manifest import write_signed_manifest
          from qday_clock.score.clock import compute_clock_state

          observed_at = datetime.now(tz=timezone.utc)
          signals = load_seed_signals(Path("data/seed_signals.json"))

          manifest_path = Path("_refresh/curator_manifest.json")
          if manifest_path.exists():
              from qday_clock.extract.classifier import classify_manifest
              from qday_clock.ingest.curator_client import fetch_manifest

              pinned = os.environ.get("QDAY_PINNED_PUBKEY_B64") or None
              m = fetch_manifest(manifest_path, expected_pubkey=pinned)
              signals = signals + classify_manifest(m, observed_at=observed_at)
              print(f"refresh: ingested manifest with {len(m.articles)} articles, "
                    f"commit={m.curator_commit[:12]}")
          else:
              print("refresh: no manifest URL provided; seeds-only refresh")

          state = compute_clock_state(signals)

          # Fail-loud if the signing-key secret is missing. Per CLAUDE.md
          # §8 we never publish (or PR) an unsigned manifest.
          signing_key_b64 = os.environ.get("QDAY_SIGNING_KEY_B64")
          if not signing_key_b64:
              raise RuntimeError(
                  "QDAY_SIGNING_KEY_B64 is not set; refusing to write an "
                  "unsigned clock_state.json. See refresh.yml signing note."
              )
          signing_key = SigningKey.from_bytes(base64.b64decode(signing_key_b64))

          out = Path("site/data/clock_state.json")
          canonical_sha = write_signed_manifest(state, out, signing_key)
          print(f"refresh: wrote {out} "
                f"clock_score={state.clock_score:.4f} "
                f"clock_hours={state.clock_hours:.2f} "
                f"canonical_sha={canonical_sha[:12]}")
          PY

      - name: Diff vs current site/data
        id: diff
        run: |
          # Use `git status --porcelain` not `git diff --quiet` — the latter
          # only sees TRACKED files, so it returned 0 (no diff) even when
          # site/data/clock_state.json was being created from scratch. That
          # bug silently blocked every cron from opening a PR between v0.2
          # (2026-06-26) and this commit. The initial site/data/clock_state.json
          # is now committed to main (PR landing this fix), so future
          # refreshes will detect modifications. We still use
          # `git status --porcelain` defensively in case a future change
          # adds a sibling file under site/data/ that isn't yet tracked.
          if [ -z "$(git status --porcelain site/data/)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No change to site/data; nothing to PR."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "site/data/ changes detected:"
            git status --porcelain site/data/
            # `git diff --stat` only shows tracked-file deltas; for new files
            # that's empty. Print it anyway for the common modification case.
            git --no-pager diff --stat site/data/ || true
          fi

      - name: Open refresh PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "refresh: recompute clock_state.json"
          branch: data/auto-refresh
          delete-branch: true
          title: "refresh: clock_state.json update"
          body: |
            Automated refresh of `site/data/clock_state.json`.

            Per plan §F we never auto-publish — this PR is the
            human-in-the-loop gate. Review:

            * Did any axis move > 0.05?
            * Did any gate fire? (see `gates_fired` in the JSON)
            * Does CHANGELOG need a `Gate fires` or `Reversals` entry?
            * Were sources added/removed since the last refresh?
          labels: |
            refresh
            requires-review
